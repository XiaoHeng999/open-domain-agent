# Open Agent Configuration
# ──────────────────────────────────────────────
# Resolution priority (highest wins):
#   CLI overrides  >  Environment variables  >  .env file  >  this file  >  Pydantic defaults
#
# Environment variables use the OPEN_AGENT_ prefix:
#   OPEN_AGENT_MODEL_API_KEY, OPEN_AGENT_MODEL_BASE_URL, etc.
# ──────────────────────────────────────────────

model:
  # LLM provider: openai | anthropic | deepseek | local
  provider: deepseek

  # Model name (provider-specific)
  name: deepseek-chat

  # Generation temperature (0.0 - 2.0)
  temperature: 0.7

  # Maximum tokens per response
  max_tokens: 4096

  # API key — DO NOT put here. Use .env or OPEN_AGENT_MODEL_API_KEY env var
  # api_key: sk-xxxxx

  # Custom API base URL (for proxies, compatible endpoints, etc.)
  base_url: https://api.deepseek.com/v1

memory:
  # Runtime layer — session-scoped context window
  runtime_token_budget: 8000
  compression_threshold: 0.7
  aggressive_threshold: 0.9
  keep_recent_turns: 3
  max_tool_result_tokens: 2000
  tool_cache_max_entries: 50

  # Profile layer — SQLite-backed user preferences
  profile_db_path: .open_agent/memory/profile/profile.sqlite
  profile_max_inject_tokens: 500

  # Retrieval layer — vector-backed episodic + semantic
  retrieval_store_dir: .open_agent/memory/retrieval
  retrieval_embedding_model: all-MiniLM-L6-v2
  retrieval_top_k: 5
  retrieval_max_inject_tokens: 1500
  retrieval_score_threshold: 0.5

  # Archive layer — JSONL cold storage
  archive_dir: .open_agent/memory/archive

  # Session todo
  todo_staleness_rounds: 3

safety:
  # strict | permissive | off
  safety_level: strict
  trusted_paths: []
  sensitive_files:
    - .env
    - credentials.json
    - "*.key"
    - "*.pem"

sandbox:
  # daytona | docker | subprocess
  backend: subprocess
  auto_timeout: 300

permissions:
  # cautious | conservative | fluent | unrestricted
  # cautious: ask user for all non-read operations
  # conservative: only read operations allowed
  # fluent: safe ops auto-allowed, others ask user (default)
  # unrestricted: only deny rules apply
  mode: fluent

  # Deny rules — always block matching operations
  deny: []
  # - tool: exec
  #   pattern: "rm -rf *"
  # - tool: read_file
  #   path: "./secrets/**"

  # Allow rules — auto-allow matching operations (bypasses ask-user)
  allow: []
  # - tool: exec
  #   pattern: "git status"
  # - tool: exec
  #   pattern: "pip install *"

routing:
  # rule | llm
  complexity_method: rule
  domains:
    - coding
    - search
    - web
    - general
  fast_path_confidence: 0.9

checkpoint:
  enabled: true
  interval: 1
  # json | sqlite
  storage_backend: json
  storage_path: .open_agent/checkpoints

trace:
  enabled: true
  store_traces: true
  trace_dir: .open_agent/traces

# Default workspace (overridden by --workspace / -w CLI flag)
workspace: .
